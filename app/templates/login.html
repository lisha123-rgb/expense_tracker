{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card custom-card p-4" style="width: 100%; max-width: 400px;">

        <h3 class="text-center mb-4 fw-bold">Welcome Back</h3>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Enter your email"
                       required>
            </div>

            <!-- Password -->
            <div class="mb-3 position-relative">
                <label class="form-label fw-semibold">Password</label>

                <input type="password"
                       name="password"
                       id="loginPassword"
                       class="form-control pe-5"
                       placeholder="Enter your password"
                       required>

                <i class="bi bi-eye position-absolute"
                   style="right:15px; top:70%; transform:translateY(-50%); cursor:pointer;"
                   onclick="togglePassword('loginPassword', this)">
                </i>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-primary w-100 mt-2">
                Login
            </button>
        </form>

        <p class="text-center mt-3 mb-0">
            Don’t have an account?
            <a href="{{ url_for('main.register') }}">Register</a>
        </p>

    </div>

</div>

{% endblock %}
